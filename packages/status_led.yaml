globals:
  - id: led_brightness
    type: float
    restore_value: true
    initial_value: '0.3'

number:
  - platform: template
    name: "Status LED Helligkeit"
    id: led_brightness_slider
    icon: "mdi:brightness-6"
    entity_category: config
    min_value: 0.05
    max_value: 1.0
    step: 0.05
    initial_value: 0.3
    optimistic: true
    restore_value: true
    on_value:
      then:
        - globals.set:
            id: led_brightness
            value: !lambda "return x;"
        - script.execute: led_restore_status

light:
  # Physischer NeoPixel-Strip – 1 LED, intern
  - platform: esp32_rmt_led_strip
    id: neopixel_strip
    rgb_order: GRB
    pin: GPIO14
    num_leds: 1
    chipset: ws2812
    internal: true

  # LED 1 – WiFi-/System-Status
  - platform: partition
    id: neopixel_status
    name: "Status LED"
    internal: true
    segments:
      - id: neopixel_strip
        from: 0
        to: 0
