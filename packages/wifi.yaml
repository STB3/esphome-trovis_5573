wifi:
  ap:
    ssid: "ESPHome-Trovis"    # Fallback-AP wenn kein WLAN verfügbar

  on_connect:
    then:
      - script.stop: led_ap_blink
      - light.turn_on:
          id: neopixel_status
          red: 0%
          green: 100%
          blue: 0%
          brightness: 30%

  on_disconnect:
    then:
      - script.execute: led_ap_blink

script:
  - id: led_ap_blink
    mode: restart
    then:
      - while:
          condition:
            lambda: "return true;"
          then:
            - light.turn_on:
                id: neopixel_status
                red: 0%
                green: 100%
                blue: 0%
                brightness: 40%
            - delay: 500ms
            - light.turn_off:
                id: neopixel_status
            - delay: 500ms

  - id: led_restore_status
    mode: restart
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                id: neopixel_status
                red: 0%
                green: 100%
                blue: 0%
                brightness: 30%
          else:
            - script.execute: led_ap_blink

captive_portal:

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "WLAN IP"
      entity_category: diagnostic
    mac_address:
      name: "WLAN Mac"
      entity_category: diagnostic
    ssid:
      name: "WLAN SSID"
      entity_category: diagnostic

sensor:
  - platform: wifi_signal
    name: "WLAN Signalstärke"
    id: wifi_signal_strength
    update_interval: 60s
