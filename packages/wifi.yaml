wifi:
  ap:
    ssid: "ESPHome-Trovis"    # Fallback-AP wenn kein WLAN verfügbar

  on_connect:
    then:
      - script.stop: led_ap_blink
      - light.turn_on:
          id: neopixel_status
          red: 0%
          green: 100%
          blue: 0%
          brightness: !lambda "return id(led_brightness);"

  on_disconnect:
    then:
      - script.execute: led_ap_blink

script:
  - id: led_ap_blink
    mode: restart
    then:
      - while:
          condition:
            lambda: "return true;"
          then:
            - light.turn_on:
                id: neopixel_status
                red: 0%
                green: 100%
                blue: 0%
                brightness: !lambda "return id(led_brightness);"
            - delay: 500ms
            - light.turn_off:
                id: neopixel_status
            - delay: 500ms

  - id: led_restore_status
    mode: restart
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                id: neopixel_status
                red: 0%
                green: 100%
                blue: 0%
                brightness: !lambda "return id(led_brightness);"
          else:
            - script.execute: led_ap_blink

captive_portal:

sensor:
  - platform: wifi_signal
    name: "WiFi RSSI"
    id: wifi_signal_strength
    update_interval: 60s
