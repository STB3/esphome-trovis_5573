uart:
  id: modbus_uart
  tx_pin: GPIO2
  rx_pin: GPIO3
  baud_rate: 9600
  stop_bits: 1
  data_bits: 8
  parity: NONE
  rx_buffer_size: 512

modbus:
  id: modbus1
  uart_id: modbus_uart
  send_wait_time: 250ms

modbus_controller:
  - id: trovis
    modbus_id: modbus1
    address: 255
    command_throttle: 200ms
    setup_priority: -10
    update_interval: 30s    # do not use values < 30s. Current cycle through all registers takes 22s
                            # in case the device is not responding
    offline_skip_updates: 0
    on_online:
      then:
        - if:
            condition:
              script.is_running: led_uart_rx
            then:
              []   # RX flash is active, don't overwrite it
            else:
              - script.execute: led_restore_status
    on_offline:
      then:
        - if:
            condition:
              script.is_running: led_uart_rx
            then:
              []
            else:
              - script.execute: led_restore_status

script:
  - id: led_uart_rx
    mode: restart
    then:
      - light.turn_on:
          id: neopixel_status
          red: 100%
          green: 0%
          blue: 0%
          brightness: 50%
      - delay: 500ms
      - script.execute: led_restore_status

