sensor:
  # --- Diagnose ---
  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Systemcode-Nummer"
    register_type: holding
    address: 0
    value_type: U_WORD
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Firmware Version Trovis"
    register_type: holding
    address: 2
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Hardware Version Trovis"
    register_type: holding
    address: 3
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic

  # --- Temperaturen ---
  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Außentemperatur"
    id: AussentempAF1
    unit_of_measurement: "°C"
    icon: "mdi:home-thermometer"
    register_type: holding
    address: 9
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    on_value:
      then:
        - script.execute: led_uart_rx

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Vorlauftemperatur"
    id: VorlauftempVF1
    unit_of_measurement: "°C"
    register_type: holding
    address: 12
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Rücklauftemperatur"
    id: RueckltempRueF1
    unit_of_measurement: "°C"
    register_type: holding
    address: 16
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Wassertemperatur"
    id: SpeichertempSF1
    unit_of_measurement: "°C"
    register_type: holding
    address: 22
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Vorlaufsollwert"
    id: VorlSollwRk1
    unit_of_measurement: "°C"
    register_type: holding
    address: 999
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Rücklauftemperatur-Begrenzung"
    register_type: holding
    address: 1007
    value_type: U_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.01

binary_sensor:
  - platform: modbus_controller
    modbus_controller_id: trovis
    id: BinaerausgBA1
    name: "Umwälzpumpe"
    register_type: coil
    address: 56

  - platform: modbus_controller
    modbus_controller_id: trovis
    id: BinaerausgBA4
    name: "Speicherladepumpe"
    register_type: coil
    address: 59

  - platform: modbus_controller
    modbus_controller_id: trovis
    id: BinaerausgBA5
    name: "Zirkulationspumpe"
    register_type: coil
    address: 60

switch:
  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Write Enable"
    id: write_enable
    register_type: coil
    address: 144
    icon: "mdi:lock-open-outline"

  - platform: modbus_controller
    modbus_controller_id: trovis
    id: FB05VerzATAnp
    name: "FB05: Verzoegerte Aussentemperaturanpassung fallend"
    register_type: coil
    address: 133

  - platform: modbus_controller
    modbus_controller_id: trovis
    id: FB06VerzATAnp
    name: "FB06: Verzoegerte Aussentemperaturanpassung steigend"
    register_type: coil
    address: 134

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Fußboden-Trocknungsmodus"
    register_type: coil
    address: 135

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Solarunterstützung"
    register_type: coil
    address: 136

number:
  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Minimale Vorlauftemperatur"
    id: MinVorlRk1
    unit_of_measurement: "°C"
    icon: "mdi:thermometer-low"
    register_type: holding
    address: 1001
    multiply: 10

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Solltemperatur Tag"
    icon: "mdi:sun-thermometer-outline"
    id: TagSollRk1
    unit_of_measurement: "°C"
    register_type: holding
    address: 1002
    multiply: 10

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Solltemperatur Nacht"
    id: NachtSollRk1
    icon: "mdi:sun-thermometer"
    unit_of_measurement: "°C"
    register_type: holding
    address: 1003
    multiply: 10

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Steigung Kennlinie"
    id: SteigHeizKLRk1
    register_type: holding
    address: 1005
    icon: "mdi:chart-bell-curve-cumulative"
    multiply: 10

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Niveau Kennlinie"
    id: NivHeizKLRk1
    unit_of_measurement: "K"
    icon: "mdi:chart-bell-curve-cumulative"
    register_type: holding
    address: 1006
    value_type: "S_WORD"
    multiply: 10

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Wassersollwert"
    id: TWSollw
    icon: "mdi:thermometer-water"
    unit_of_measurement: "°C"
    register_type: holding
    address: 1799
    multiply: 10

  - platform: modbus_controller
    modbus_controller_id: trovis
    name: "Verzögerung AT-Anpassung"
    id: ATVerzoegerung
    icon: "mdi:timelapse"
    unit_of_measurement: "K/h"
    register_type: holding
    address: 117

